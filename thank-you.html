<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thank you — Jonathan Bardolf</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <style>
    a { color: var(--accent); text-decoration: none; font-weight: 700; }
    a:hover { text-decoration: underline; }
    p { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div style="position:relative;max-width:980px;margin:18px auto 0;padding:0 24px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700">Jonathan Bardolf</div>
        <div style="display:flex;gap:12px;align-items:center">
          <button id="menu-btn" aria-expanded="false" aria-controls="main-nav">Menu
            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform-origin:center">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <nav id="main-nav">
            <a href="index.html"><span>Home</span></a>
            <a href="about.html"><span>About</span></a>
            <a href="projects.html"><span>Projects</span></a>
            <a href="experiences.html"><span>Academics</span></a>
            <a href="interests.html"><span>Interests</span></a>
            <a href="blog.html"><span>Blog</span></a>
            <a href="contact.html"><span>Contact</span></a>
          </nav>
        </div>
      </div>
    </div>
  </header>
  <div class="thank-you-wrap">
    <h1 style="margin-top:0">Thanks — message received</h1>
    <p>I appreciate you reaching out. I'll get back to you shortly.</p>
    <p style="margin-top:18px"><a class="btn" href="index.html">Return to homepage</a></p>
  </div>
  <button class="mobile-btn" id="mobile-menu-btn" aria-label="Toggle compact view" title="Compact view">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" stroke-width="1.5"/>
      <line x1="9" y1="20" x2="15" y2="20" stroke-width="1.5"/>
    </svg>
  </button>
  <script>
  (function(){
    const btn = document.getElementById('menu-btn');
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const nav = document.getElementById('main-nav');
    if (!btn || !nav) return;

    function toggleMenu(e){ e.stopPropagation(); const open = nav.classList.toggle('open'); btn.setAttribute('aria-expanded', open ? 'true' : 'false'); if (open) btn.classList.add('active'); else btn.classList.remove('active'); }

    btn.addEventListener('click', toggleMenu);

    if (mobileBtn) {
      mobileBtn.addEventListener('click', function(e){
        e.stopPropagation();
        document.body.classList.toggle('compact-view');
        localStorage.setItem('compactView', document.body.classList.contains('compact-view'));
      });
    }

    document.addEventListener('click', function(e){ if (!nav.contains(e.target) && e.target !== btn && e.target !== mobileBtn && nav.classList.contains('open')){ nav.classList.remove('open'); btn.setAttribute('aria-expanded','false'); btn.classList.remove('active'); }});
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && nav.classList.contains('open')){ nav.classList.remove('open'); btn.setAttribute('aria-expanded','false'); btn.classList.remove('active'); }});
    nav.querySelectorAll('a').forEach(a => a.addEventListener('click', ()=>{ nav.classList.remove('open'); btn.setAttribute('aria-expanded','false'); btn.classList.remove('active'); }));

    if (localStorage.getItem('compactView') === 'true') {
      document.body.classList.add('compact-view');
    }

    // Mark current page as active
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    nav.querySelectorAll('a').forEach(link => {
      const href = link.getAttribute('href');
      if (href === currentPage || (currentPage === '' && href === 'index.html')) {
        link.classList.add('active');
      }
    });
  })();
  </script>
</body>
</html>
